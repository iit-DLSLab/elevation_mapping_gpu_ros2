elevation_mapping:
  ros__parameters:
    
    #### Frames & topics 
    pose_topic: ''                              # External pose topic; leave empty to use TF only.
    map_frame: 'odom'                           # The map frame where the odometry source uses.
    base_frame: 'base_link'                     # The robot's base frame. This frame will be a center of the map.
    corrected_map_frame: 'corrected_odom'                 # The robot's base frame. This frame will be a center of the map.
    
    #### Grid / map geometry 
    resolution: 0.04                           # resolution in m.
    map_length: 8.0                             # map's size in m.

    #### Sensor & outlier handling 
    voxel_filter_size: 0.02                    # Voxel downsampling size [m] applied to incoming points.
    sensor_noise_factor: 0.06                  # point's noise is sensor_noise_factor*z^2 (z is distance from sensor).

    # reject obvious bad returns
    min_valid_distance: 0.1                   # points with shorter distance will be filtered out.
    max_height_range:   1.0                    # points higher than this value from sensor will be filtered out to disable ceiling. 
    mahalanobis_thresh: 2.0                    # points outside this distance is outlier.
    outlier_variance: 0.02                     # if point is outlier, add this value to the cell.

    # Ramped ceiling: reject if z > max(d - ramped_height_range_b, 0) * a + c
    ramped_height_range_a: 0.3                # if z > max(d - ramped_height_range_b, 0) * ramped_height_range_a + ramped_height_range_c, reject.
    ramped_height_range_b: 1.0                 # if z > max(d - ramped_height_range_b, 0) * ramped_height_range_a + ramped_height_range_c, reject.
    ramped_height_range_c: 0.15                 # if z > max(d - ramped_height_range_b, 0) * ramped_height_range_a + ramped_height_range_c, reject.

    #### Variance / fusion weights 
    average_weight: 0.4                      # Fusion weight: higher trusts new measurements more (faster, noisier).
    time_variance: 0.03                        # add this value when update_variance is called.
    initial_variance: 200.0                  # initial variance for each cell.
    max_variance: 20.0                       # maximum variance for each cell.

    #### Timings & rates 
    update_variance_fps: 30.0                   # fps for updating variance.
    update_pose_fps: 10.0                       # fps for updating pose and shift the center of map.
    time_interval: 0.1                         # Time layer is updated with this interval.
    map_acquire_fps: 5.0                       # Raw map is fetched from GPU memory in this fps.
    publish_statistics_fps: 1.0                 # Publish statistics topic in this fps.
    recordable_fps: 10.0                        # Recordable fps for pointcloud.

    #### Visibility cleanup / ray tracing 
    max_ray_length: 3.0                         # maximum length for ray tracing.
    cleanup_step: 0.05                         # subtitute this value from validity layer at visibiltiy cleanup.
    cleanup_cos_thresh: 0.2                    # subtitute this value from validity layer at visibiltiy cleanup.

    #### Drift compensation (uses stable, traversable cells) 
    enable_drift_compensation: true            # Enable TF drift estimation/correction using stable cells.
    drift_compensation_variance_inlier: 0.04    # Cells with variance below this are considered stable for drift.
    max_drift: 0.08                             # drift compensation happens only the drift is smaller than this value (for safety)     
    drift_compensation_alpha: 0.08              # drift compensation alpha for smoother update of drift compensation 
    min_height_drift_cnt: 150                   # drift compensation only happens if the valid cells are more than this number.
    position_noise_thresh: 0.008                # if the position change is bigger than this value, the drift compensation happens.   
    orientation_noise_thresh: 0.008             # lowpass filter alpha used for detecting movements.
    position_lowpass_alpha: 0.15                # lowpass filter alpha used for detecting movements.       
    orientation_lowpass_alpha: 0.15             # lowpass filter alpha used for detecting movements.
    traversability_inlier: 0.95                  # cells with higher traversability are used for drift compensation.

    #### Safety / traversability layers 
    dilation_size: 3                            # dilation size after the init.
    wall_num_thresh: 100                          # if there are more points than this value, only higher points than the current height are used to make the wall more sharp.
    safe_thresh: 0.7                            # if traversability is smaller, it is counted as unsafe cell.
    safe_min_thresh: 0.4                        # polygon is unsafe if there exists lower traversability than this.
    max_unsafe_n: 10                            # if the number of cells under safe_thresh exceeds this value, polygon is unsafe.

    #### Overlap clearance (multi-floor)  
    overlap_clear_range_xy: 4.0                 # XY range [m] around robot where overlap clearing is applied.
    overlap_clear_range_z: 2.0                  # Z range [m] used to clear cells outside valid floor band.    

    #### Feature toggles 
    enable_edge_sharpen: false                   # Apply edge sharpening to height map.
    enable_visibility_cleanup: true             # Run ray-based cleanup for occlusions.
    enable_overlap_clearance: false             # Enable clearing for multi-floor overlap scenarios.
    enable_pointcloud_publishing: true          # Publish map as point cloud (heavier output).
    enable_drift_corrected_TF_publishing: false # Publish drift-corrected TF; keep false for bag playback to avoid TF_OLD_DATA.
    enable_normal_color: false                  # Add a 'color' layer from normals (requires adding to publishers).
    enable_normal_arrow_publishing: false       # Publish normal arrows for visualization (RViz).

    #### Initializer 
    initialize_method: 'linear'                 # Choose one from 'nearest', 'linear', 'cubic'
    initialize_frame_id: ['base_link']           # One tf (like ['footprint'] ) initializes a square around it.   
    initialize_tf_offset: [0.0]                 # z direction. Should be same number as initialize_frame_id.
    dilation_size_initialize: 3                 # dilation size after the init.   
    initialize_tf_grid_size: 1.0                # This is not used if number of tf is more than 3.
    use_initializer_at_start: true              # Use initializer when the node starts.

    #### Traversability filter 
    use_chainer: false                          # Use chainer as a backend of traversability filter or pytorch. If false, it uses pytorch. pytorch requires ~2GB more GPU memory compared to chainer but runs faster.
    # weight_file: '$(find-pkg-share elevation_mapping_cupy)/config/core/weights.dat'  
    weight_file: '/home/ros/workspace/src/elevation_mapping_cupy/elevation_mapping_cupy/config/core/weights.dat' # Weight file for traversability filter  

    #### Upper bound 
    use_only_above_for_upper_bound: false        # For upper-bound estimation, use only measurements above cell height.

    #### Default Plugins 
    plugin_config_file: '/home/ros/workspace/src/elevation_mapping_cupy/elevation_mapping_cupy/config/core/plugin_config.yaml' # Layer/filter plugins.
